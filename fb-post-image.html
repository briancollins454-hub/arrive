<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Arrivé Social Image</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

  .card {
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #0a0e1a 0%, #0F172A 30%, #1E293B 70%, #0F172A 100%);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  /* Ambient glow effects */
  .card::before {
    content: '';
    position: absolute;
    top: -30%;
    left: -20%;
    width: 70%;
    height: 80%;
    background: radial-gradient(ellipse, rgba(212,168,83,0.12) 0%, transparent 60%);
    pointer-events: none;
  }
  .card::after {
    content: '';
    position: absolute;
    bottom: -30%;
    right: -20%;
    width: 70%;
    height: 80%;
    background: radial-gradient(ellipse, rgba(13,148,136,0.10) 0%, transparent 60%);
    pointer-events: none;
  }

  /* Subtle grid pattern */
  .grid-overlay {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(212,168,83,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(212,168,83,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  /* Top accent line */
  .top-line {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #D4A853, #0D9488, #D4A853);
  }

  .content {
    position: relative;
    z-index: 2;
    padding: 0 80px;
  }

  .logo {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, #D4A853 0%, #0D9488 100%);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 44px;
    font-weight: 700;
    color: #fff;
    margin: 0 auto 28px;
    box-shadow: 0 12px 40px rgba(212,168,83,0.3), 0 4px 12px rgba(0,0,0,0.3);
  }

  .title {
    font-family: 'Playfair Display', serif;
    font-size: 62px;
    font-weight: 700;
    background: linear-gradient(135deg, #E8C97A 0%, #D4A853 40%, #B8892E 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 12px;
    letter-spacing: 1px;
  }

  .tagline {
    font-family: 'Inter', sans-serif;
    font-size: 22px;
    font-weight: 300;
    color: #94A3B8;
    margin-bottom: 40px;
    letter-spacing: 0.5px;
  }

  .features {
    display: flex;
    gap: 32px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 40px;
  }

  .feature {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: #CBD5E1;
  }

  .feature .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-gold { background: #D4A853; box-shadow: 0 0 8px rgba(212,168,83,0.5); }
  .dot-teal { background: #0D9488; box-shadow: 0 0 8px rgba(13,148,136,0.5); }

  .url {
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 600;
    color: #0D9488;
    letter-spacing: 0.5px;
  }

  .built-by {
    position: absolute;
    bottom: 28px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: #64748B;
    letter-spacing: 2px;
    text-transform: uppercase;
    z-index: 2;
  }
  .built-by span {
    color: #D4A853;
    font-weight: 600;
  }

  /* Corner accents */
  .corner {
    position: absolute;
    width: 40px;
    height: 40px;
    z-index: 2;
  }
  .corner-tl { top: 24px; left: 24px; border-top: 2px solid rgba(212,168,83,0.3); border-left: 2px solid rgba(212,168,83,0.3); }
  .corner-tr { top: 24px; right: 24px; border-top: 2px solid rgba(13,148,136,0.3); border-right: 2px solid rgba(13,148,136,0.3); }
  .corner-bl { bottom: 24px; left: 24px; border-bottom: 2px solid rgba(13,148,136,0.3); border-left: 2px solid rgba(13,148,136,0.3); }
  .corner-br { bottom: 24px; right: 24px; border-bottom: 2px solid rgba(212,168,83,0.3); border-right: 2px solid rgba(212,168,83,0.3); }
</style>
</head>
<body>

<div class="card">
  <div class="grid-overlay"></div>
  <div class="top-line"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="content">
    <div class="logo">A</div>
    <h1 class="title">Arrivé</h1>
    <p class="tagline">The all-in-one booking platform for boutique hotels</p>

    <div class="features">
      <div class="feature"><div class="dot dot-gold"></div>Direct Bookings</div>
      <div class="feature"><div class="dot dot-teal"></div>Live Dashboard</div>
      <div class="feature"><div class="dot dot-gold"></div>Guest Profiles</div>
      <div class="feature"><div class="dot dot-teal"></div>Housekeeping</div>
      <div class="feature"><div class="dot dot-gold"></div>Stripe Payments</div>
      <div class="feature"><div class="dot dot-teal"></div>AI Insights</div>
    </div>

    <div class="url">www.arrivebooking.online</div>
  </div>

  <div class="built-by">Built by a hotelier, <span>for hoteliers</span></div>
</div>

</body>
</html>
